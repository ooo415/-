<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My star gourmet - マイスターグルメ -</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
            background: #111;
            color: white;
        }
        #app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #222;
            padding: 12px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        .title-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .stats {
            font-size: 0.85rem;
            color: #aaa;
        }
        #map {
            flex-grow: 1;
            width: 100%;
            background: #111;
            z-index: 1;
        }
        .custom-popup {
            color: #333;
        }
        .custom-popup h3 {
            margin: 0 0 5px 0;
            font-size: 1rem;
        }
        .custom-popup p {
            margin: 0 0 10px 0;
            font-size: 0.85rem;
            color: #666;
        }
        .delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            width: 100%;
        }
        .delete-btn:hover {
            background: #ff3333;
        }
        .leaflet-vignette {
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div class="title-area">
            <h1>🌟 My star gourmet</h1>
        </div>
        <div class="stats">登録したグルメ: <span id="count">0</span> 店舗</div>
    </header>
    <div style="position: relative; flex-grow: 1; display: flex; flex-direction: column;">
        <div id="map"></div>
        <div class="leaflet-vignette"></div>
    </div>
</div>

<script>
    console.log("✅ スクリプト読み込み開始");

    let map;
    let infoArray = [];
    const markersLayer = L.layerGroup();

    // Leafletが読み込まれるまで待機
    if (typeof L === 'undefined') {
        console.error("❌ Leafletが読み込まれていません");
        setTimeout(() => {
            document.body.innerHTML = '<h1 style="color:red">エラー: ネットワーク接続を確認してください</h1>';
        }, 2000);
    } else {
        initMap();
    }

    function initMap() {
        console.log("🗺️ 地図を初期化中...");
        
        map = L.map('map', {
            zoomControl: false
        }).setView([35.6812, 139.7671], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);
        markersLayer.addTo(map);

        loadData();
        renderMarkers();
        updateCount();

        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;

            setTimeout(() => {
                const name = prompt("店舗名を入力してください：");
                if (!name) return;

                const memo = prompt("メモや評価を入力してください：");
                const newGourmet = {
                    id: Date.now().toString(),
                    name: name,
                    memo: memo || "",
                    lat: lat,
                    lng: lng
                };

                infoArray.push(newGourmet);
                saveData();
                renderMarkers();
            }, 50);
        });

        console.log("✅ 地図の初期化完了");
    }

    function loadData() {
        try {
            const localData = localStorage.getItem('gourmet_map_data');
            if (localData) {
                infoArray = JSON.parse(localData);
                console.log(`📍 ${infoArray.length} 件のデータを読み込みました`);
            }
        } catch (e) {
            console.error("データの読み込みに失敗:", e);
        }
    }

    function updateCount() {
        document.getElementById('count').innerText = infoArray.length;
    }

    function saveData() {
        try {
            localStorage.setItem('gourmet_map_data', JSON.stringify(infoArray));
            console.log("💾 データを保存しました");
        } catch (e) {
            alert("データの保存に失敗しました（容量制限など）");
            console.error("保存エラー:", e);
        }
        updateCount();
    }

    function renderMarkers() {
        markersLayer.clearLayers();
        infoArray.forEach((item) => {
            const marker = L.marker([item.lat, item.lng]).addTo(markersLayer);
            
            const popupContent = document.createElement('div');
            popupContent.className = 'custom-popup';
            popupContent.innerHTML = `
                <h3>${item.name}</h3>
                <p>${item.memo}</p>
            `;
            
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.innerText = '削除する';
            delBtn.onclick = function() {
                if(confirm(`「${item.name}」を削除しますか？`)) {
                    infoArray = infoArray.filter(g => g.id !== item.id);
                    saveData();
                    renderMarkers();
                }
            };
            
            popupContent.appendChild(delBtn);
            marker.bindPopup(popupContent);
        });
    }
</script>

</body>
</html>
